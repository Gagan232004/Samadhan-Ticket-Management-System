version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ticketly
      POSTGRES_PASSWORD: ticketly_password
      POSTGRES_DB: ticketly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://ticketly:ticketly_password@db:5432/ticketly_db
      - FRONTEND_URL=http://localhost
      - PORT=5000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-my-super-secret-token}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"

volumes:
  postgres_data:
