version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ticketly
      POSTGRES_PASSWORD: ticketly_password
      POSTGRES_DB: ticketly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql://ticketly:ticketly_password@db:5432/ticketly_db
      - FRONTEND_URL=http://localhost:3000
      - PORT=5000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-my-super-secret-token}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - BETTER_AUTH_SECRET=my-super-secret-better-auth-key
      - BETTER_AUTH_URL=http://localhost:5000
      - PRISMA_CLIENT_ENGINE_TYPE=binary
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "3000:80"

volumes:
  postgres_data:
